<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ error_title }} - Calc3D</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: system-ui, -apple-system, 'Inter', sans-serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
    <!-- Error Icon -->
    <div class="w-20 h-20 mx-auto mb-6 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, #667eea, #764ba2);">
      <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        {% if status_code == 404 %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M12 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        {% elif status_code == 403 %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        {% elif status_code == 429 %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        {% else %}
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        {% endif %}
      </svg>
    </div>

    <!-- Error Code -->
    <div class="text-6xl font-extrabold mb-4" style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
      {{ status_code }}
    </div>

    <!-- Error Title -->
    <h1 class="text-2xl font-bold text-gray-800 mb-3">
      {{ error_title }}
    </h1>

    <!-- Error Message -->
    <p class="text-gray-600 mb-6">
      {{ error_message }}
    </p>

    <!-- Technical Details (if any) -->
    {% if technical_detail %}
    <details class="mb-6 text-left">
      <summary class="cursor-pointer text-sm font-medium text-gray-500 hover:text-gray-700">
        Detalles técnicos
      </summary>
      <pre class="mt-2 p-3 bg-gray-50 rounded text-xs text-gray-700 overflow-auto">{{ technical_detail }}</pre>
    </details>
    {% endif %}

    <!-- Actions -->
    <div class="flex gap-3 justify-center">
      <a href="/" class="inline-flex items-center gap-2 px-6 py-3 rounded-lg font-semibold text-white" style="background: linear-gradient(135deg, #667eea, #764ba2);">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Ir al Inicio
      </a>
      <button onclick="history.back()" class="px-6 py-3 rounded-lg font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 transition">
        Volver
      </button>
    </div>
  </div>
</body>
</html>
