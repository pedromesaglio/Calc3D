<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calc3D — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: .75rem; top: 50%; transform: translateY(-50%);
      color: #94a3b8; pointer-events: none; width: 1rem; height: 1rem;
    }
    .input {
      width: 100%; border-radius: .6rem; border: 1.5px solid #e2e8f0;
      padding: .6rem .75rem .6rem 2.5rem;
      font-size: .9rem; color: #1e293b; background: #f8fafc;
      transition: border-color .15s, box-shadow .15s, background .15s; outline: none;
      font-family: 'Inter', sans-serif;
    }
    .input:focus {
      border-color: #6366f1; box-shadow: 0 0 0 3px rgb(99 102 241/.15); background: #fff;
    }
    .input::placeholder { color: #cbd5e1; }

    .field-label {
      display: block; font-size: .7rem; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      color: #94a3b8; margin-bottom: .4rem;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff; font-weight: 700; font-size: .9rem;
      padding: .7rem 1.5rem; border-radius: .75rem; border: none; cursor: pointer;
      box-shadow: 0 2px 10px rgb(99 102 241/.35);
      transition: transform .15s, box-shadow .15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 4px 16px rgb(99 102 241/.45); }
    .btn-primary:active { transform: translateY(0); }

    .tab-btn {
      flex: 1; padding: .55rem; font-size: .85rem; font-weight: 600;
      border-radius: .5rem; cursor: pointer; transition: all .15s;
      border: none; font-family: 'Inter', sans-serif;
    }
    .tab-active   { background: #fff; color: #6366f1; box-shadow: 0 1px 4px rgb(0 0 0/.1); }
    .tab-inactive { background: transparent; color: #94a3b8; }
    .tab-inactive:hover { color: #6366f1; }

    /* Subtle grid overlay */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        repeating-linear-gradient(0deg,  rgba(255,255,255,.04) 0, rgba(255,255,255,.04) 1px, transparent 1px, transparent 48px),
        repeating-linear-gradient(90deg, rgba(255,255,255,.04) 0, rgba(255,255,255,.04) 1px, transparent 1px, transparent 48px);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10"
      style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4c1d95 100%);">

  <!-- Card -->
  <div class="relative z-10 w-full max-w-sm">

    <!-- Brand -->
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-3"
           style="background:rgba(255,255,255,.12); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.2);">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6h.01M18 18h.01M12 12l4.5-4.5M3 21l4-4"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 3H5a2 2 0 00-2 2v3m16-5h-3a2 2 0 00-2 2v.5M21 8V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3m8 0h3a2 2 0 002-2v-3"/>
        </svg>
      </div>
      <h1 class="text-white font-extrabold text-2xl tracking-tight">Calc3D</h1>
      <p class="text-indigo-300 text-xs mt-1">Calculadora de costos de impresión 3D</p>
    </div>

    <!-- Form card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden"
         style="box-shadow: 0 25px 60px rgb(0 0 0/.4);">

      <!-- Tabs -->
      <div class="p-1.5 m-4 rounded-xl flex gap-1" style="background:#f1f5f9;">
        <button class="tab-btn tab-active"   id="tabLogin"    onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab-btn tab-inactive" id="tabRegister" onclick="switchTab('register')">Registrarse</button>
      </div>

      <!-- Error -->
      {% if error %}
      <div class="mx-4 mb-1 flex items-center gap-2 bg-red-50 border border-red-200 text-red-600
                  text-xs font-medium rounded-lg px-3 py-2.5">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <!-- Login form -->
      <div id="formLogin">
        <form method="POST" action="/login" class="px-4 pb-5 space-y-4">
          <div>
            <label class="field-label">Usuario</label>
            <div class="input-wrap">
              <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <input class="input" type="text" name="username" autocomplete="username"
                     placeholder="tunombre" required autofocus />
            </div>
          </div>
          <div>
            <label class="field-label">Contraseña</label>
            <div class="input-wrap">
              <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <input class="input" type="password" name="password" autocomplete="current-password"
                     placeholder="••••••••" required />
            </div>
          </div>
          <button type="submit" class="btn-primary mt-2">Entrar</button>
        </form>
      </div>

      <!-- Register form -->
      <div id="formRegister" class="hidden">
        <form method="POST" action="/register" class="px-4 pb-5 space-y-4">
          <div>
            <label class="field-label">Nombre de usuario</label>
            <div class="input-wrap">
              <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <input class="input" type="text" name="username" autocomplete="username"
                     placeholder="tunombre" minlength="3" required />
            </div>
          </div>
          <div>
            <label class="field-label">Contraseña</label>
            <div class="input-wrap">
              <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <input class="input" type="password" name="password" autocomplete="new-password"
                     placeholder="Mín. 6 caracteres" minlength="6" required />
            </div>
          </div>
          <div>
            <label class="field-label">Confirmar contraseña</label>
            <div class="input-wrap">
              <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
              </svg>
              <input class="input" type="password" name="password2" autocomplete="new-password"
                     placeholder="Repetí la contraseña" minlength="6" required />
            </div>
          </div>
          <button type="submit" class="btn-primary"
                  style="background: linear-gradient(135deg, #7c3aed, #6366f1);">
            Crear cuenta
          </button>
        </form>
      </div>

    </div>

    <p class="text-center text-xs text-indigo-300/60 mt-5">
      Calc3D &mdash; Calculadora de costos de impresión 3D
    </p>
  </div>

  <script>
    // Restaurar tab activo si hubo error de server
    const serverTab = "{{ tab }}";
    if (serverTab === 'register') switchTab('register');

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('formLogin').classList.toggle('hidden', !isLogin);
      document.getElementById('formRegister').classList.toggle('hidden', isLogin);
      document.getElementById('tabLogin').className    = 'tab-btn ' + (isLogin  ? 'tab-active' : 'tab-inactive');
      document.getElementById('tabRegister').className = 'tab-btn ' + (!isLogin ? 'tab-active' : 'tab-inactive');
    }
  </script>
</body>
</html>
